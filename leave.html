<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leave Plan — EMS</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .leave-body { background: var(--bg); }
    .leave-main {
      max-width: 1100px; margin: 0 auto; padding: 40px 24px 60px;
      animation: fadeUp 400ms 80ms var(--ease) both;
    }

    /* ── Header ── */
    .leave-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
    }
    .leave-header h1 { font-size: 1.5rem; letter-spacing: -0.02em; }
    .leave-header p  { color: var(--muted); font-size: 0.875rem; margin-top: 4px; }

    .year-selector { display: flex; align-items: center; gap: 10px; }
    .year-selector label { font-size: 0.875rem; font-weight: 500; color: var(--muted); }
    .year-selector select {
      padding: 8px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-family: inherit; font-size: 0.9375rem;
      font-weight: 600; color: var(--text); background: var(--surface);
      outline: none; cursor: pointer;
      transition: border-color 200ms, box-shadow 200ms;
    }
    .year-selector select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(17,17,17,.07);
    }

    /* ── Card ── */
    .leave-card {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden;
    }

    /* ── Scroll wrapper ── */
    .table-scroll { overflow-x: auto; }

    /* ── Table ── */
    .leave-table {
      width: 100%; border-collapse: collapse;
      font-size: 0.8125rem; min-width: 960px;
    }
    .leave-table thead tr {
      background: #fafaf9;
    }
    .leave-table thead tr:first-child {
      border-bottom: none;
    }
    .leave-table thead tr:last-child {
      border-bottom: 1.5px solid var(--border);
    }
    .leave-table th {
      padding: 10px 8px; text-align: center;
      font-size: 0.69rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap;
    }
    .leave-table th.col-name {
      text-align: left; padding-left: 16px; min-width: 160px;
    }
    .leave-table th.col-dept {
      text-align: left; min-width: 110px;
    }
    .leave-table th.month-header {
      border-left: 1px solid var(--border);
      font-size: 0.75rem; font-weight: 700;
      color: var(--text); text-transform: none; letter-spacing: 0;
    }
    .leave-table th.sub-header {
      border-left: 1px solid #ebebea;
      font-size: 0.65rem; color: var(--muted); padding: 5px 4px;
    }
    .leave-table th.sub-header:first-of-type {
      border-left: 1px solid var(--border);
    }

    .leave-table td {
      padding: 6px 6px; border-bottom: 1px solid #f0f0ee;
      vertical-align: middle; text-align: center;
    }
    .leave-table tr:last-child td { border-bottom: none; }
    .leave-table tr:hover td { background: #fafaf9; }
    .leave-table td.col-name {
      text-align: left; padding-left: 16px; font-weight: 500;
    }
    .leave-table td.col-dept {
      text-align: left; color: var(--muted); font-size: 0.78rem;
    }
    .leave-table td.month-sep { border-left: 1px solid var(--border); }

    /* ── Input ── */
    .leave-input {
      width: 54px; padding: 5px 4px;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-family: inherit; font-size: 0.8125rem; font-weight: 500;
      color: var(--text); background: #fafaf9;
      text-align: center; outline: none;
      transition: border-color 200ms, box-shadow 200ms, background 200ms;
    }
    .leave-input:focus {
      border-color: var(--accent); background: #fff;
      box-shadow: 0 0 0 3px rgba(17,17,17,.07);
    }
    .leave-input:not(:placeholder-shown) {
      background: #fff;
    }

    /* ── Save bar ── */
    .save-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-top: 1px solid var(--border);
      flex-wrap: wrap; gap: 12px;
    }
    .save-bar .message { margin: 0; font-size: 0.8125rem; }
    .save-btn { width: auto; padding: 10px 28px; }

    /* ── Info bar ── */
    .info-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-top: 1px solid var(--border);
      background: #fafaf9; font-size: 0.75rem; color: var(--muted);
    }
    .info-bar svg { flex-shrink: 0; }

    /* ── Loading ── */
    .table-loading {
      text-align: center; padding: 56px;
      color: var(--muted); font-size: 0.9rem;
    }
  </style>
</head>
<body class="leave-body">

  <header class="topbar">
    <div class="topbar-brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="2" width="6" height="6" rx="1.5" fill="white"/>
          <rect x="10" y="2" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
          <rect x="2" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
          <rect x="10" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".3"/>
        </svg>
      </div>
      <span class="brand-name">EMS</span>
    </div>
    <div class="topbar-right">
      <a href="dashboard.html" style="font-size:0.875rem;color:var(--muted);text-decoration:none;margin-right:16px;">← Dashboard</a>
      <span class="user-badge" id="topbarEmail"></span>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </header>

  <main class="leave-main">
    <div class="leave-header">
      <div>
        <h1>Leave: Plan vs Actual</h1>
        <p>Enter planned and actual leave days per employee per month. Any user can update.</p>
      </div>
      <div class="year-selector">
        <label for="yearSelect">Year</label>
        <select id="yearSelect"></select>
      </div>
    </div>

    <div class="leave-card">
      <div class="table-scroll">
        <div id="tableArea">
          <div class="table-loading">Loading…</div>
        </div>
      </div>

      <div class="info-bar">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 7v4M8 5.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Any logged-in user can edit any field. Save commits all rows to Firestore. Last save overwrites.
      </div>

      <div class="save-bar">
        <p class="message" id="saveMsg"></p>
        <button class="btn save-btn" id="saveBtn">
          <span class="btn-label">Save All Changes</span>
          <span class="spinner"></span>
        </button>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script type="module" src="js/leave.js"></script>
</body>
</html>
