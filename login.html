<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{

            width:350px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);

        }

        input{

            width:100%;
            padding:10px;
            margin:10px 0;

        }

        button{

            width:100%;
            padding:12px;
            cursor:pointer;

        }

        #message{

            margin-top:15px;
            color:red;

        }

    </style>

</head>

<body>

<div class="login-box">

<h2 align="center">Employee Login</h2>

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">
Login
</button>

<p align="center">

Don't have an account?

<a href="signup.html">
Register
</a>

</p>

<p id="message"></p>

</div>

<script type="module" src="js/login.js"></script>

</body>
</html>
