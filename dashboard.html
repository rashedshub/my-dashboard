<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — EMS</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dash-body">

  <div class="app-shell">

    <!-- ── Sidebar ── -->
    <nav class="sidebar" id="sidebar">
      <div class="sb-top">
        <div class="sb-brand">
          <div class="brand-icon">
            <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
              <rect x="2" y="2" width="6" height="6" rx="1.5" fill="white"/>
              <rect x="10" y="2" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
              <rect x="2" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
              <rect x="10" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".3"/>
            </svg>
          </div>
          <span class="sb-brand-name">EMS</span>
        </div>

        <nav class="sb-nav">

          <!-- Dashboard -->
          <a href="index.html" class="sb-item active">
            <svg class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            <span class="sb-label">Dashboard</span>
          </a>

          <!-- Surveys -->
          <a href="survey.html" class="sb-item">
            <svg class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
              <rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/>
            </svg>
            <span class="sb-label">Surveys</span>
          </a>

          <!-- Data Entry (collapsible group) -->
          <div class="sb-group">
            <button class="sb-group-toggle" id="dataEntryToggle" aria-expanded="false">
              <svg class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
              <span class="sb-label">Data Entry</span>
              <svg class="sb-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
            <div class="sb-sub" id="dataEntrySub">
              <a href="leave.html" class="sb-sub-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                  <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                Leave planning
              </a>
            </div>
          </div>

        </nav>
      </div>

      <div class="sb-bottom">
        <div class="sb-user">
          <div class="sb-avatar" id="sbAvatar">—</div>
          <div class="sb-user-info">
            <span class="sb-user-name" id="sbName">—</span>
            <span class="sb-user-email" id="sbEmail">—</span>
          </div>
        </div>
        <button class="sb-toggle" id="sbToggle" aria-label="Collapse sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
          <span class="sb-label">Collapse</span>
        </button>
        <button class="sb-logout" id="logoutBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span class="sb-label">Log out</span>
        </button>
      </div>
    </nav>

    <!-- ── Main content ── -->
    <main class="dash-main">

      <div class="dash-header">
        <div>
          <h1>Hello, <span id="userName">there</span> 👋</h1>
          <p class="dash-sub">Here's a summary of your account.</p>
        </div>
        <span class="user-badge" id="topbarEmail"></span>
      </div>

      <!-- Stats row -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Role</div>
          <div class="stat-value" id="statRole">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Status</div>
          <div class="stat-value" id="statStatus">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Employee ID</div>
          <div class="stat-value" id="statEmpId">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Surveys done</div>
          <div class="stat-value" id="statSurveys">—</div>
        </div>
      </div>

      <!-- Account details only -->
      <div class="info-card" style="margin-bottom:28px;">
        <h2>Account details</h2>
        <div class="info-row"><span class="key">Full name</span><span class="val" id="infoName">—</span></div>
        <div class="info-row"><span class="key">Email</span><span class="val" id="infoEmail">—</span></div>
        <div class="info-row"><span class="key">Employee ID</span><span class="val" id="infoEmpId">—</span></div>
        <div class="info-row"><span class="key">Role</span><span class="val" id="infoRole">—</span></div>
        <div class="info-row"><span class="key">Status</span><span class="val" id="infoStatus">—</span></div>
        <div class="info-row"><span class="key">Member since</span><span class="val" id="infoCreated">—</span></div>
      </div>

      <!-- Survey activity chart -->
      <div class="chart-section">
        <h2>My survey activity</h2>
        <div id="myChartsArea">
          <div class="empty-state" style="padding:32px;">
            No survey responses yet. <a href="survey.html" style="color:var(--text);font-weight:600;">Take a survey →</a>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
