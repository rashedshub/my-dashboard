<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — EMS</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dash-body">

  <header class="topbar">
    <div class="topbar-brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="2" width="6" height="6" rx="1.5" fill="white"/>
          <rect x="10" y="2" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
          <rect x="2" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
          <rect x="10" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".3"/>
        </svg>
      </div>
      <span class="brand-name">EMS</span>
    </div>
    <div class="topbar-right">
      <a href="survey.html" style="font-size:0.875rem;font-weight:500;color:var(--text);text-decoration:none;margin-right:16px;">📋 Surveys</a>
      <span class="user-badge" id="topbarEmail"></span>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </header>

  <main class="dash-main">
    <div class="welcome-block">
      <h1>Hello, <span id="userName">there</span> 👋</h1>
      <p>Here's a summary of your account.</p>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Role</div>
        <div class="stat-value" id="statRole">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Status</div>
        <div class="stat-value" id="statStatus">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Employee ID</div>
        <div class="stat-value" id="statEmpId">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Surveys Completed</div>
        <div class="stat-value" id="statSurveys">—</div>
      </div>
    </div>

    <div class="info-card" style="margin-bottom:28px;">
      <h2>Account details</h2>
      <div class="info-row">
        <span class="key">Full name</span>
        <span class="val" id="infoName">—</span>
      </div>
      <div class="info-row">
        <span class="key">Email</span>
        <span class="val" id="infoEmail">—</span>
      </div>
      <div class="info-row">
        <span class="key">Employee ID</span>
        <span class="val" id="infoEmpId">—</span>
      </div>
      <div class="info-row">
        <span class="key">Role</span>
        <span class="val" id="infoRole">—</span>
      </div>
      <div class="info-row">
        <span class="key">Status</span>
        <span class="val" id="infoStatus">—</span>
      </div>
      <div class="info-row">
        <span class="key">Member since</span>
        <span class="val" id="infoCreated">—</span>
      </div>
    </div>

    <!-- Survey activity chart -->
    <div class="chart-section">
      <h2>My Survey Activity</h2>
      <div id="myChartsArea">
        <div class="empty-state" style="padding:32px;">No survey responses yet. <a href="survey.html" style="color:var(--text);font-weight:600;">Take a survey →</a></div>
      </div>
    </div>
  </main>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
