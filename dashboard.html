<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body" style="display:block; padding:0">

  <div class="topbar">
    <h2>📊 My Dashboard</h2>
    <span id="user-email" style="color:#94a3b8; font-size:0.85rem"></span>
    <button onclick="logout()">Sign Out</button>
  </div>

  <div class="main" style="padding: 1rem">
    <p class="welcome">Welcome back 👋</p>
    <div class="cards">
      <div class="stat-card">
        <div class="label">Total Users</div>
        <div class="value">1,284</div>
      </div>
      <div class="stat-card">
        <div class="label">Revenue</div>
        <div class="value">$9,430</div>
      </div>
      <div class="stat-card">
        <div class="label">Active Sessions</div>
        <div class="value">42</div>
      </div>
      <div class="stat-card">
        <div class="label">Uptime</div>
        <div class="value">99.9%</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // 🔴 SAME CONFIG AS index.html
    // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyB-ECqcB2CYmZ4NH2ikmMvfA2CxJ6d7uKA",
  authDomain: "my-dashboard-aeb7f.firebaseapp.com",
  projectId: "my-dashboard-aeb7f",
  storageBucket: "my-dashboard-aeb7f.firebasestorage.app",
  messagingSenderId: "374310408419",
  appId: "1:374310408419:web:05381fafc5e0c4e77bb5d6"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Guard: redirect to login if not authenticated
    onAuthStateChanged(auth, user => {
      if (!user) {
        window.location.href = "index.html";
      } else {
        document.getElementById('user-email').textContent = user.email;
      }
    });

    window.logout = () => signOut(auth).then(() => window.location.href = "index.html");
  </script>
</body>
</html>
